databaseChangeLog:
  - changeSet:
      id: 0009_create_and_populate_comments_table_1
      author: marisarichmond
      comment: create comments table
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: comments
      changes:
        - createTable:
            tableName: comments
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: comment_pkey
              - column:
                  name: text
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: task_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_task_id
                    references: tasks(id)
                    nullable: false
  - changeSet:
      id: 0009_create_and_populate_comments_table_2
      author: marisarichmond
      comment: populate comments table
      changes:
        - loadData:
            file: data/Comments.csv
            encoding: UTF-8
            quotChar: '"'
            separator: ;
            tableName: comments
            relativeToChangelogFile: true
            columns:
              - column:
                  header: id
                  name: id
                  type: uuid
              - column:
                  header: task_id
                  name: task_id
                  type: uuid
              - column:
                  header: text
                  name: text
                  type: string
              - column:
                  header: created_at
                  name: created_at
                  valueDate: CURRENT_TIMESTAMP
              - column:
                  header: updated_at
                  name: updated_at
                  valueDate: CURRENT_TIMESTAMP