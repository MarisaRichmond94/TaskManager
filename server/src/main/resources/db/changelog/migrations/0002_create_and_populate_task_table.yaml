databaseChangeLog:
  - changeSet:
      id: 0002_create_and_populate_task_table_1
      author: marisarichmond
      comment: create tasks table
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: tasks
      changes:
        - createTable:
            tableName: tasks
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: task_pkey
              - column:
                  name: objective
                  type: varchar
              - column:
                  name: description
                  type: varchar
              - column:
                  name: due_date
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: is_pinned
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_user_id
                    references: users(id)
                    nullable: false
  - changeSet:
      id: 0002_create_and_populate_task_table_2
      author: marisarichmond
      comment: populate tasks table
      changes:
        - loadData:
            file: data/Tasks.csv
            encoding: UTF-8
            quotChar: '"'
            separator: ;
            tableName: tasks
            relativeToChangelogFile: true
            columns:
              - column:
                  header: id
                  name: id
                  type: uuid
              - column:
                  header: objective
                  name: objective
                  type: string
              - column:
                  header: description
                  name: description
                  type: string
              - column:
                  header: due_date
                  name: due_date
                  valueDate: CURRENT_TIMESTAMP
              - column:
                  header: created_at
                  name: created_at
                  valueDate: CURRENT_TIMESTAMP
              - column:
                  header: updated_at
                  name: updated_at
                  valueDate: CURRENT_TIMESTAMP
              - column:
                  header: is_pinned
                  name: is_pinned
                  type: boolean
              - column:
                  header: user_id
                  name: user_id
                  type: uuid